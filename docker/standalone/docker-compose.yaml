services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zndraw:
    image: pythonf/zndraw:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      - ZNDRAW_SERVER_STORAGE=/app/data/zndraw-data.lmdb
    volumes:
      - zndraw-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000').read()"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  taskiq-worker:
    image: pythonf/zndraw:latest
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    command: ["taskiq", "worker", "zndraw.broker:broker"]
    env_file: .env
    environment:
      - ZNDRAW_SERVER_STORAGE=/app/data/zndraw-data.lmdb
      - ZNDRAW_SERVER_INTERNAL_URL=http://zndraw:8000
    volumes:
      - zndraw-data:/app/data
    healthcheck:
      test: ["NONE"]

  template-loader:
    image: pythonf/zndraw:latest
    restart: "no"
    depends_on:
      zndraw: { condition: service_healthy }
    env_file: .env
    environment:
      - ZNDRAW_URL=http://zndraw:8000
      - ZNDRAW_USER=${ZNDRAW_AUTH_DEFAULT_ADMIN_EMAIL}
      - ZNDRAW_PASSWORD=${ZNDRAW_AUTH_DEFAULT_ADMIN_PASSWORD}
    command:
      - sh
      - -c
      - |
        zndraw-cli rooms create --room template --copy-from @none &&
        zndraw-cli frames extend --room template /app/templates/s22.xyz &&
        zndraw-cli rooms lock --room template &&
        zndraw-cli rooms set-default --room template
    volumes:
      - ./s22.xyz:/app/templates/s22.xyz:ro

volumes:
  redis-data:
  zndraw-data:
