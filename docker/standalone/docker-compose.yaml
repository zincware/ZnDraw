services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zndraw:
    image: pythonf/zndraw:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      redis: { condition: service_healthy }
    environment:
      - ZNDRAW_REDIS_URL=redis://redis:6379
      - ZNDRAW_STORAGE=/app/data/zndraw-data.lmdb
      - ZNDRAW_WORKER_ENABLED=false
    volumes:
      - zndraw-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000').read()"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  taskiq-worker:
    image: pythonf/zndraw:latest
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    command: ["taskiq", "worker", "zndraw.broker:broker"]
    environment:
      - ZNDRAW_REDIS_URL=redis://redis:6379
      - ZNDRAW_STORAGE=/app/data/zndraw-data.lmdb
      - ZNDRAW_SERVER_URL=http://zndraw:5000
    volumes:
      - zndraw-data:/app/data

  template-loader:
    image: pythonf/zndraw:latest
    restart: "no"
    depends_on:
      zndraw: { condition: service_healthy }
    environment:
      - ZNDRAW_URL=http://zndraw:5000
    command:
      - sh
      - -c
      - |
        zndraw-cli rooms create --room-id template &&
        zndraw-cli frames extend template --file /app/templates/ethanol.xyz &&
        zndraw-cli rooms lock template &&
        zndraw-cli rooms set-default template
    volumes:
      - ./ethanol.xyz:/app/templates/ethanol.xyz:ro

volumes:
  redis-data:
  zndraw-data:
