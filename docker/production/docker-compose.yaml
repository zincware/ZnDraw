services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      zndraw: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  zndraw:
    image: pythonf/zndraw:latest
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
    env_file: .env
    environment:
      - ZNDRAW_REDIS_URL=redis://redis:6379
      - ZNDRAW_STORAGE=mongodb://mongo:27017/zndraw
      - ZNDRAW_WORKER_ENABLED=false
    deploy:
      replicas: 3
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000').read()"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  taskiq-worker:
    image: pythonf/zndraw:latest
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
    command: ["taskiq", "worker", "zndraw.broker:broker"]
    env_file: .env
    environment:
      - ZNDRAW_REDIS_URL=redis://redis:6379
      - ZNDRAW_STORAGE=mongodb://mongo:27017/zndraw
      - ZNDRAW_SERVER_URL=http://nginx

  template-loader:
    image: pythonf/zndraw:latest
    restart: "no"
    depends_on:
      nginx: { condition: service_healthy }
    env_file: .env
    environment:
      - ZNDRAW_URL=http://nginx
    command:
      - sh
      - -c
      - |
        zndraw-cli rooms create --room-id template &&
        zndraw-cli frames extend template --file /app/templates/ethanol.xyz &&
        zndraw-cli rooms lock template &&
        zndraw-cli rooms set-default template
    volumes:
      - ./ethanol.xyz:/app/templates/ethanol.xyz:ro

volumes:
  redis-data:
  mongo-data:
